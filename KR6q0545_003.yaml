body:
  text: 法孫明廣明珍等編頌古拈花微笑末上招人笑全鋒已挫折何須正法眼直待瞎驢滅打車打牛入草求人不丈夫大都年老亦心孤車牛打處成何事躍出追風天馬駒德山托鉢德山托鉢過堂惹起一場禍殃誰謂父為子隱明明證父攘羊百丈野狐野狐聚首打鄉談叵耐時人作指南黃檗溈山明底事前三三與後三三文殊問菴提遮女地水火風離合合離未嘗自得只可隨宜堪笑七佛之祖師與他女子畫蛾眉南泉斬貓南泉雖峻利趙州更軟頑一個死貓兒幾人特地參詩偈送雲麓洪居士進京古路迢迢自往回匣中寶劍起風雷掀眸相送燕京去要見將軍虎竹來示石鼓山秀柏座主忽覺城頭畫角吹孚公從此豁雙眉而今石鼓寂寥久好發雷音啓大機示雪文上座父母未生誰是我勿勞向外別尋家酸鹹甜苦無多舌咬著石頭打落牙與休休王居士石火電光難舉似稜稜眉宇若楊徐更須躍出幔天網直使龐公見大巫示知客送往迎來禮數頻主賓有理各難伸何如一奮金鵬怒活捉蛟龍當點心與含焰璽上人逢迎何處少知音萬水千山撥草尋印子為君輕擊碎前途莫負祖師心與含輝成明居士者段光明處處真勿云軒冕不通津曾聞盡道休官去林下而今有個人示旲彰禪人無法法無無法法無無法法法全彰老僧指出無無法大地拈來一芥藏與麟趾禪人門風了也事如何一棒當頭碎祖窠須信個中端的意祥麟一趾已成多與心拙禪人金烏無伴已多年一旦相逢問別傳踢倒須彌填巨海森羅印子可橫懸咦贈一門禪人曾聞草偃萬峰巔行到滇南氣勢全佛剎微塵皆鼓動一門超出妙莊嚴與另別禪人布袋老鴉一出身遍空法界盡通津回觀者片閒枝葉埋沒乾坤多少人與旵拙禪人寶鏡齊彰萬象形空花歷歷滿乾坤今朝撲破娘生面更不循他光影門示碧徵監寺赤條條地荷叢林飽暖饑寒識衆心大抵生薑辣不改惱人腸肚到如今示吼一茶頭識得鍋兒大與小便知杓柄短和長趙州公案秖如此運水搬柴好自強示山海淨能道人開峰無物可堪傳一句該通空劫前珍重道人須猛力末山無著是師焉示省呆監寺左右逢源自認真全肩荷衆識艱辛幾番撾動楊岐鼓撥轉慈明正法輪示萬德侍者白牯牛兒耳角齊輕輕跳過五須彌國師三喚曾三應何處是渠辜負伊示幻如直歲能荷衆人所不能木頭石塊盡崚嶒了知事事皆如幻始信叢林有準繩示晟修蔡居士喫齊念佛信心堅實不可外邊念佛尋佛示安南僧安南來震旦語別話頭同誰是知音者山禽翠藹中示西域僧遊十萬里問道支那形狀古怪衣履絡索不識方言開口便錯擔佛覓佛辜負行腳還知麼何分東土與西天日日日從夜分落寄文周大德衡陽花藥主人公五嶺雲從聚粵東妙觸宣明佛子住誰同曉夜論幡風送不昧長老歸天龍別來方一九看破子湖狗曳杖省老僧相觀皆白首唯唯敘衷腸依依難釋手重別是今朝還能訊我否途中好善為春色醇如酒寄五羊實行老上座萬行皆如實僧倫之白璧茫茫三界中何處尋彌勒聞為王者尊歲月復歲月緬想若而人臨機必活脫至滇煙花離曲靖風月到滇城猶憶前年事臨行一鶚鳴衡陽春發離岸登舟掛遠篷桃花春水正溶溶祝融九面環湘轉何日衾雲最上重過洞庭萬派朝宗處扁舟我獨來湘山雲霧盡幾點覆如盆廬山臥龍菴摩雲寒翠聳垂壁晚花香誰許真龍臥蒼生望沛滂佛手巖巖巖舒佛手歷歷露禪關不識指頭意千山又萬山憶滇一別滇南又幾秋昆池老月應風流緬懷曳杖雲遊日花酒樓頭快打毬雲居懷古掉卻升天事殘雲繞緑蘿何須金擲地竹徑好音多示明廣侍者問道如何不可離穿衣喫飯來唐塞老僧無力舉烏藤分付嗣燈打骨折懷出拙禪者老僧病即闍黎病誰信闍黎病更深掀倒藥爐歸去後莫尋起處到于今示堪嗣監寺衲僧活計如天闊豐儉隨家過了休踏得妙高田地穩別峰何事更堪憂師離雲南雲臺含拙偕諸耆宿懇求垂訓乃口占一偈示之曰既是人中月須明教外宗何當枯寂寂山海盡真空真贊慈雲常住請宜良不幸出者妖怪性急人遺心平人戴君王不事父母不拜忠孝兩忘閻羅倒賣一條白棒沒人情魔佛直教心膽碎慈雲禪子切莫言臨濟第三十二代含拙上座請者懶漢甘埋沒不參禪不念佛喫些酒子上床眠齁鼾雷震三間屋足足足含拙禪人莫輕忽旵拙上座請走遍天下秖個尋常住個院子有壁無廂藏頭露腳說青道黃是凡是聖少人測量旵公持去好深藏家醜勿堪向外揚碧天禪人請文理總然不通參究又無所得者般沒趣阿師安可為人作則阿呵呵難摸索三十年來海上遊依前還我舊時節含輝居士請者蠻阿師鬚髮髼鬆沒甚定準指西說東更有一般蠻到底長年喫酒掣顛風古樵上座請萬里遊行沒個知音腰卻樵斧亂斫緇林未讀世典不識佛經六根失盡八面縱橫遇著瞎驢狂更甚一場塗抹正堪驚妙融王居士請人情不周因緣沒得一身徹骨精窮到處情存風月終朝以是作非難將伎倆湊泊問著劈頭便棒沒句尖新言說妙融居士描難全持歸供養莫休歇道能石居士請論道如盲談禪似啞懶得進修偏好頑耍搖樹討風生挖窟尋蛇打一切文言不知秖管之乎者也更有一樁不自量逢人乞文錢修起開峰才告假李二道人請者個頭陀行事懡㦬慣將家醜遍傳娑婆非佛非祖亦非禪和見者聞者出萬重波大幢上座請者個和尚大模大樣披領袈裟靠條拄杖不喜除鬚髮佛祖位中那有他慣論人是非煩惱窠裏稱無狀公然臨濟門風玷辱雙桂堂上是者般沒帳算底阿師大幢長老何故甘心描他供養不昧上座請花首頭陀不會說話白棒橫肩走遍天下被人問著不打便罵懶論臨濟三要三玄那知世間佛祖為大且非天性使然豈是杜拗虛詐天龍長老奉渠歸展向當陽作話杷尼山海道人請鬚髮髼鬆鼻孔列碣說豎說橫口無二舌智者懷疑愚人指摘眼似山高量較海闊曳杖幾思入帝京且同上座遊西粵書問復九蓮大幢長老闊別數載聲氣杳然存亡浩歎寤寐無違忽接來書慶揚眉睫不惟喜長老向干戈林裏綽有轉身一路且見忍俊不禁處早已化作春風遍布百草頭矣時至理彰信果然也然此事要須頭正尾正方不墮時流務小失大者之蹊徑不見演祖和尚道如人牽一頭牛從窗櫺中過頭角四蹄都過了秖有尾巴過不得恁麼說話早晚亦須舉著自有沒量大人向結角羅紋處一刀兩段得路便行可以佩魔玉印作佛祖師縱橫無礙底不可放過切宜勉旃復天龍不昧長老接來啓并開堂法語讀誦一過見有灑落透脫時節已出今時向昭昭靈靈處釘繫驢橛者之窠臼矣更須知先聖有一息尚存一息參究之語是真師承所謂學佛法人如入大海莫目蹄涔以為全潮意蓋謂此長老誠實人正不在老僧之多囑也棕拂一枝聯芳偈一紙表信惟冀蓄養毋負先宗佛事為碧徵監寺安靈師至靈前驀召云碧澄委悉麼此是你數年以來在開峰赤身荷衆底本命元辰俄于廣西向荷不及處撲碎了也今日與麼歸來直是吞吐十虛坐斷三際碧爾澄清無變無易遂左右顧視云且道還有生死去來消息也無分明月在梅花上看到梅花早已遲喝一喝掀翻供桌歸方丈文登徐居士請為先太夫人秉炬師曳杖直前擊棺云會麼生亦何曾生死亦何曾死生死兩無端直入菩提理此雖直截斷根源接火炬擲下云更看優曇生火裏行實師坐次旵拙禪人率衆作禮炷香請說行由師作色曰家醜何堪外揚畫蛇寧用添足山僧惡狀那可言傳旵等再拜啓曰伏望和尚不吝慈悲令彼初機有所矜式兼杜魔外千萬讒狺師喟然曰我此一衆初無前後同見同聞且同食息誰是初機取人矜式況先聖云勿輕未悟汝直欲我毀裂成範且佛祖前言往行學者視之例如敝屣而反欲我誇張駑駘取笑大方是何心行然山僧行腳已有同學同行聞見于前何患惡魔之囂囂耶但是殘局難為結殺今日面赤不如語直以釋諸人胸中疑悶余乃雲南宜良縣人父姓谷母時氏家計貧寒幼未讀書一十四歲出家禮竹子山竹林寺順語老師剃落十七歲住滇南雲臺山拜楞嚴經題十九忽動無常生死之想即欲訪問偶有德海禪客自雞足來豫為安單喫茶次語及生死大事余心喜此言有相為處遂三更時分把燭至單前作禮長跪乞垂開導蒙禪德示我僧問趙州狗子還有佛性也無州曰無底公案勉囑參究豫即不分晝夜參狗子有佛性也無無如是五載了無下因思雲臺僻處滇南素無參禪師訓山中同住者例皆熟習赴應獨我一人不入群隊含恥忍詬陸沉下板歲月飄忽一事無成念所做處宛如嚼鐵一則恐非良法一則恐錯用心畫虎成狗取笑他人不如別求善導著實修行庶幾不枉出世做人一番便將前來參究工夫打底放下卻往澄江府羅藏山打木魚念佛後因家師以計誘我下山至貴州龍里雲臺又住四載一日遇濟凡禪師問曰密行師每日所行何事豫曰無事可行濟曰莫道無事好你胸中分明有一事未了何妨舉來大家商量豫被他一言打動心事秖得從直供通謂昔日有一禪德告我參僧問趙州狗子有佛性也無趙曰無底話頭刻苦窮究經于五載無個入處便乃一時放下至今未了濟曰好個一時放下至今未了可惜你鏟地不知落處豫作禮曰願垂示誨濟劈面掌曰鈍置殺人豫仍不會再求開示時濟師見我遲鈍乃顰蹙而言曰參禪參到無可奈何處是得力處猶如戰士失卻寶刀雖則赤手以勇健故不顧利害拍馬直前奪取敵人手中器械便殺人去豫于言下忽然見得趙州老子下手處更不禮謝將濟師驀口一摑推出門外濟師抖身大笑而去豫爾後日用事之難易應念解釋是時闡化滇黔尊宿謂豫力量過人皆欲致我于座下適燕居大師來山豫即隨至新漆受戒圓戒日豫合掌跪地次有居士來豫前作禮豫與一掌拓開居士向大師道今日一會止有一個戒子豫聞傳語居士曰合取狗口一日入室大師曰竿頭絲線從君弄不犯清波意自殊那裏是不犯處豫拂袖出索筆書偈呈大師曰漁父垂絲釣江頭惡浪高本來空寂寂那怕犯波濤大師改寂寂作寂寞豫拜而出解制後歸龍里雲臺與抱拙夜坐拙曰師年四九猶不著忙豫曰忙甚麼拙曰為佛弟子當報佛恩不見道將此深心奉塵剎耶豫曰莫屎沸拙曰師聽某言某則侍左右行不聽某言某則歸川中去如是三反四覆叨呾不已豫因攜之離雲臺山一路參訪數位禪師末後至夔州府梁山縣參雙桂老和尚問不遠千里來相見千里內即不問千里外一句作麼生道師曰兩眼對兩眼豫即作禮出一日砌墻腳有蜈蚣走出豫絶叫曰一條蜈蚣師回顧豫即以石打作兩段本師見兩頭齊動問曰你道他性命在阿那頭豫以腳踏卻曰一舉兩得本師曰究竟不知在阿那頭豫呈偈曰者個蜈蚣太煞奇戰場不怕斷頭皮攔腰一擊重開眼正是當陽種毒時師點首一日師問書記止止曰古人道舉一不得舉二放過一著落在第二且道一如何舉止云錯師曰是你錯是我錯止無語豫應聲曰錯錯本師便打豫作禮出次年師誕一僧整酒供養有二蚊子落杯中一僧將箸挑出師曰此二條性命要汝償僧無對豫即曰是甚麼所在由你索命一日師顧曰聞你要歸滇是否豫曰是師曰幾時去豫曰請了真贊即去師曰描得也未豫曰已描得師顧侍僧曰將桌子抬向堂上書曰走半天下住三家村鼓粥飯氣大昌惡聲咦佛祖位中留不住秖得向酒的死肉的生破山老人題一衆稱賀是時本師威喜并著即將攸之上座一手卷書正法眼藏四大字復書偈曰蚊子喁喁上鐵牛無容下嘴處難酬紛紛一夏歸山去遇虎逢龍攜出頭丙申七月初四日寓雙桂堂傳曹溪正脈第三十五世破山明手書付密行寂忍禪人正與麼時山僧秖得將錯就錯禮了三拜直至如今左不得右不得到處被人捧在堂上謂之堂頭直是屈辱諸方點汙佛祖至此驀拈拄杖召衆云大衆且道山僧即今與未行腳未出母胎時是同是別有僧下語截住云何不道將謂有多少奇特旵禪人擬率衆焚香作禮拈拄杖一時打散歸方丈法派寂成佛道達本心宗德常清淨體悟真空圓明普照智慧融通應現無方永遠昌隆嗣法門人嗣燈圓胤西蜀心拙圓懷西蜀含拙成祖西蜀旵拙成奣西蜀大幢圓相西蜀徹微智斷三楚別菴成慧江南古樵超智三楚不昧常寤三楚畫先真一三楚古天成性江南石宮自維江西知空學蘊滇南另別成乾三楚從拙成微西蜀辨鋒福慶三楚開極德慧三楚天儀妙享三楚恬一成淨三楚無山超明三楚用愚源哲三楚燦心慧光三楚法末如玉琮謄稿梓行嗣燈和尚語録序諸佛奧旨列祖關鍵天地樞機衆生本源是合一道也豈有兩般耶佛佛授受而授此也祖祖相傳而傳此也天地運動而運此也衆生不知返本還源而迷此也一切世人蔽在貪愛暗室各有一座光明幢不能返觀自照所以煩他諸佛列祖互相出世用惡辣鉗錘與人拔楔抽釘去縛解黏如日月麗天映破人人黑暗無明待披雲見日個個知有如嗣燈禪師妙年剃染草齡圓具遍參尊宿落節于雙桂師翁拄杖頭邊負命于密行老人椎拂之下樹插竿于雒源懸赤幟于滏水凡上堂法語截鐵斬釘石火電光難容湊泊所謂如太阿鋒似大火聚近之則燎卻面門觸著則通身紅爛總是要人返觀自照擺脫根塵識自本心立地成佛有法孫雪浦楚石二子將稿東下嘉禾剞劂入藏流通時豫亦寓楞嚴編校錦江禪燈鋟梓未終二子持以問序豫曰令師翁芳名播于兩川而兩川之人序之矣甘露澍于雒源而雒源之人序之矣豫不敢揚塵于潔白地上墜露于滄海皋邊惟不副來機聊贅數語雖為鉢盂安柄實徵淵源有自時康熙甲戌蒲月節屆旁午青城法弟竹浪徹生寓嘉禾角里先生書院沐手謹識中興寺嗣燈胤禪師語録法孫如玉如琮等編順治丁酉師掩關蜀南雒源中興禪院逮庚子歲十月朔日受自流井玄亮王居士等及諸山耆宿請開關云掩關三載惡孽彌堅卓拄杖云掀翻窠臼鑑地輝天不因霜雪操爭得吐芳妍至法座以杖指云者個棚子三賢十聖到來俱亡鋒結舌晦影潛形且胤上座今日憑個甚麼道理喝一喝卓拄杖云竿木隨身逢場作戲遂升拈香云此香道充宇宙德遍山河齊七政于璿璣躋八荒于洪範爇向爐中端為祝延今上皇帝聖躬萬歲太子千秋及文武公卿遠近檀越當期請主諸山耆舊伏願同乘聖化各證無生次拈云此香根盤空劫葉覆無際在壑盈壑在溝盈溝爇向爐中供養三世諸佛歷代祖師古今諸大善知識伏願金繩開覺道寶筏渡迷津再拈云此香久遭毒陷罪犯彌天一種平懷背觸不得今向人天衆前拈來一時爇卻供養傳臨濟正脈第三十二世本師密行老和尚用酬法乳之恩敷就座維那白椎云法筵龍象衆當觀第一義師卓拄杖云第一義諦是甚驢鳴犬吠你既不能承當便請當陽㓟露問如何是關中句師云寰中天子敕進云如何是關外句師云塞外將軍令進云未審關中與關外是同是別師打云中外一時收乃豎拄杖云關中一句討甚憑據關外一言旋乾轉坤寰中天子塞外將軍卓一卓云三邊一箭收功後四海何愁不太平擲拄杖維那結椎云諦觀法王法法王法如是下座除夕示衆禁足禪關三載餘人心清泠道心孤頻添獸炭生爐火懶把山桃當鐵符傲骨不隨世路屈赤腸豈為利名舒適聞爆竹聲霜夜知是今宵一歲除召衆云大衆中興不似北禪潦倒烹露地白牛與衆分歲致令市井小人窺算夜半三更入室胡鬧卓拄杖云秖有三十粗刺藜伏惟珍重莫怪空疏彌陀誕鐘鉉王居士請上堂問大寂定中還有照用也無師云波斯落水進云舉足下足動用無私時如何師云鬼窟裏作活計僧喝師便打乃云娑婆世界阿彌陀今日初生意氣多拈拄杖云相好光明何似佛慈悲喜捨卻成魔阿呵呵好大哥驀召云鐘鉉鉉應諾師擲下拄杖云靜處薩婆訶便下座顧侍者云拄杖子聻者度與師接得連打兩棒者云無端無端師又打兩棒云辜負辜負休休王居士入山上堂問屏卻咽喉唇吻如何道得親切句師云問得固好答得更奇僧擬議師打云還記得話頭麼僧云若與麼則瞎卻人眼去在師復打云元來猶未親切問中興寺裏客來如何管待師云撾鼓升堂親驗過進云觸目無非菩提如何更要饒舌師云秖為你眼裏有沙進云大寂滅場中還有饒舌處也無師云四十九年詮不盡至今狼籍更猶多進云與麼則七縱八橫去也師云杓卜聽虛聲問如何是不二法門師云出得入不得入得出不得進云過在甚麼處師云不二法門𠰚乃舉雲門因僧問如何是和尚家風門云有讀書人來報師云雲門老人可謂毋意毋必毋固毋我中興要且不然今日若有人問如何是和尚家風秖向道逢人且說三分話未可全拋一片心且道與雲門是同是別具眼者緇素看說戒玄斌王居士請上堂問結制開堂即不問今朝說戒事如何師拈袈裟角云請你作尊證問毒鼓初撾戒壇始創禪律相非如何定當師云一字兩頭垂僧喝師便打乃云殿閣襲寒風鐵馬鳴切切一片祖師心當陽全漏泄脫卻耳門根拔出眼中屑說戒已周圓畢竟是何說拈拄杖云有條攀條無條攀例衆兄弟瞥不瞥夜來霜滿林烏龜凍作鱉擲下云死蛇直下解翻身看看咬人如火急喝一喝傳戒畢復說偈曰洗滌根塵入戒壇逢人莫道戒非禪盂中粒粒知來處便可飽餐伸腳眠為玄亮王居士對靈小參蟬鳴風徑雲起山陰西天東土不隔纖塵豎拂子召衆云還知麼玄亮居士在中興拂子頭上入于神通大光明藏正受口喃喃底為諸人道諸行無常是生滅法生滅滅已寂滅為樂驀喝云被中興一喝連忙騎卻佛殿走向諸人髑髏裏入不可思議無垢解脫王三昧而歌曰豆子山打瓦鼓齊一變至于魯三更三點日當空甜者甜兮苦者苦復喚云中興長老自應云諾白日青天莫寐語擲拂子呵呵大笑云大衆逢人但請恁麼舉玄工王居士誕日請上堂問達磨面壁和尚升座是同是別師云別則不同同則不別進云武帝聖明因甚不契厥旨師云為你道聽途說問父母未生前那個是學人本來面目師打云瞎漢寐語作麼僧擬議師連棒打出乃云淑氣催黃鳥晴光轉緑蘋若明今日事昧卻本來人大衆既明今日事因甚乃昧卻本來人不見道天上天下唯我獨尊還會獨尊之旨麼即是玄工居士父母未生前本命元辰若也會得則會人人自己本命元辰無有已生未生之別會得人人自己本命元辰則會達磨面壁與中興今日升座之旨雖然如是驀震威一喝時一僧驚倒師云俊哉衲僧一撥便轉下座佛誕上堂舉世尊初生周行七步目顧四方一手指天一手指地云天上天下唯我獨尊師云大小釋迦好似下坡不走快便難逢聽取一頌初生孩兒手忙腳亂蚌殼心肝開口便見秖如後來雲門大師云我當時若見一棒打殺與狗子喫卻貴圖天下太平又作麼生還知麼也秖是看錮鏴著生鐵亦與頌出一棒打殺恩大難酬人平不語水平不流上堂問婆子燒菴意旨如何師云借人粉黛畫蛾眉進云未審者僧過在甚麼處師云八十翁翁入場屋僧禮拜師云會麼僧云不會師云理他閒事長無明乃舉昔日婆子造菴供養一僧嘗令二八女子二時給侍一日令女子抱住問云正恁麼時如何僧云枯木倚寒巖三春無暖氣婆聞乃曰我二十年秖供養得個俗漢便趁出燒卻菴驀召云大衆適來者僧恁麼問中興恁麼答如今恁麼舉還會麼聽取一頌二十年中事俗漢已承當誰信燒菴火都成蘭麝香佛成道瓊圃李居士偕男永昌入山請上堂問陽氣少伸梅傳春信為是時節到來為是忍俊不禁師云時節到來忍俊不禁進云兩彩一賽去也師云鴨吞螺螄進云氣急殺人師云依舊跳不出進云花圓子實時如何師云惱亂春風卒未休問坐斷報化佛頭還有啓口處也無師云有言須道卻進云秖如兩口無一舌此是吾宗旨未審意旨如何師云銜枚疾走度陳倉僧禮拜云謝師答話師云莫謗中興好問心不在內不在外不在中間在甚麼處師云親言出親口僧唾地師云三十棒且待別時問世尊拈花迦葉微笑未審笑個甚麼師云笑你咬人屎橛問具足凡夫法凡夫不知時如何師云退後著進云具足聖人法聖人不會時如何師云進前來進云進前退後則不無且道凡夫與聖人畢竟相去幾何師打云一時墮坑落塹乃云世尊于正覺山前睹明星悟道歎曰奇哉奇哉一切衆生皆有如來智慧德相秖因妄想執著而不證得今朝萬里無雲晴空一亙世尊睹星衆生亦皆睹星因甚世尊便悟去而衆生長夜迷倒且世尊悟又悟個甚麼衆生迷又迷個甚麼若識衆生迷處便見世尊悟處見得世尊悟處即識衆生迷處還委悉麼驀呈拄杖云者便是世尊阿那個是衆生復橫按云者便是衆生阿那個是世尊向者裏會得智慧德相吞卻妄想執著妄想執著吐出智慧德相然後知證智慧德相本不是佛隨妄想執著亦非衆生既非衆生又不是佛衆中若有個具眼衲僧緇素看一僧云坐斷兩頭師云點一僧云將此深心奉塵剎是則名為報佛恩師云劄一僧云一點一劄拈過一邊且道今朝李居士設齊供衆如何是因齊慶贊一句師打云你辜負他李居士作麼進云打即任打畢竟如何是因齊慶贊一句師合掌云心生大歡喜自知當作佛僧禮拜師便下座上堂舉臨濟示衆曰第一句薦得堪與佛祖為師第二句薦得堪與人天為師第三句薦得自救不了師云諸方或謂臨濟大師大似靈龜負圖未出已前不妨令人疑著及乎朕兆一分敲磚打瓦狼籍不少中興以往觀之將謂如蟲禦木今日看來要且錯過臨濟還知麼當時有僧問如何是第一句濟曰三要印開朱點窄未容擬議主賓分中興與汝等頌出也要諸方檢點頌曰雲門銅錢廬陵米價連者一爻入損益卦如何是第二句濟曰妙解豈容無著問漚和爭負截流機頌曰或乘師子或乘象王三頭六臂指青道黃如何是第三句濟曰看取棚頭弄傀儡抽牽全藉裏頭人頌曰喫酒圖醉放債圖利普化乞兒解罵臨濟師云臨濟恁麼答中興恁麼頌秖許老胡知不許老胡會時有僧云秖如臨濟大師道三即一皆是空名此意如何師打云總似你者般瞎漢臨濟一宗那到今日更聽一頌殺活權在手靈機要變通欲明吾宗旨始本一言中僧禮拜師擲拄杖歸方丈際亭李居士生日請上堂問十方同聚會個個學無為此是選佛場心空及第歸如何是十方同聚會師云僧排夏臘俗列耆年進云如何是個個學無為師云運水底運水搬柴底搬柴進云此是選佛場未審選誰作佛師云唱名即不到進云如何是心空及第歸底事師云你秖好隨衆三碗兩碗僧以坐具作圓相云三世諸佛歷代祖師大千沙界有情無情總被學人縛住了也未審和尚如何出得師云騎牛上三十三天僧禮拜師打云卻是你跳不出問學人生死不明乞師開示師云山僧今日沒心情與你說得你且禮拜了退僧禮拜師打云者虛生浪死漢乃舉古德云諸法不自生亦不從他生不共不無因是故說無生中興則不然地水與火風和合而名生老病及死苦日新日日新大衆且道與古人是同是別良久喝一喝云秖知事逐眼前過不覺老從頭上來掛鐘板師至板頭召衆云大道秖在目前要且目前難睹欲識大道真體不離聲色言語豎起椎云見麼擊一下云聞麼聞見分明還是大道真體還是聲色言語復擊兩下云謹白參玄人看取令行時允先王居士請上堂問如何是出門一句師云眼看東南意在西北進云途中事若何師云亂走作麼進云和尚不可令人前不搆村後不迭店師拈拄杖云腳跟下好與三十進云過在甚麼處師云為你門外打之繞便打問玄中有路人難進要裏無私顯別傳臨濟宗風行宇宙而今已到我師前如何是第一玄師云句裏絶言詮如何是第二玄師云九重鐵鼓一鏃穿如何是第三玄師云謾拈黃葉作金錢如何是第一要師云船到三巴難舉棹如何是第二要師云十二峰前猿夜叫如何是第三要師云鱉鼻寧甘守古窖進云秖如臨濟大師云一句中須具三玄門一玄中須具三要如何是三玄三要一句師打云龍頭蛇尾得人憎僧禮拜云臨濟面目猶在師云識甚好惡問如何是庭前柏樹子師豎拄杖云趙州來也進云意旨如何師打云師子咬人韓盧逐塊問喜怒哀樂未發時如何師云五夜風搖樹進云發而中節時如何師云三秋月映潭進云發與未發時如何師云鬼窟裏頭出頭沒進云師意如何師打云打破精靈窟當空杲日明僧禮拜師又打乃云諸方上堂或垂示或舉古或拈頌徵別隨機提唱以時激揚中興今日且道說個甚麼起身云疑殺天下人機緣一僧入關中請益師搊住云者是甚麼所在許你入來僧喝師便掌僧擬進語師直打出時休休王居士顧僧云古人三鼓入室上座日午扣關個中消息請舉似看僧曰一喝分主賓照用一時行會得個中意日午打三更師云鸚鵡學人言畢竟是禽類僧云秖要知音解點頭師云藕絲牽動鐵崑崙僧擬議師又打僧至關前問離四句絶百非請師直指西來意師云禮拜著僧禮拜師便掩卻關門翌日師見僧問云昨日公案作麼生僧云不會師云者尿床鬼子問古鏡未磨時如何師云萬象森然進云磨後如何師云果然覿面不識僧問如何是入關一句師云不展鎗旗擊勝鼓僧禮拜師云降將不斬問大海為墨須彌為筆且道寫個甚麼師展手云點畫分明僧禮拜師云會麼僧云不會師云聽取一偈點畫分明文彩未彰要會便會切忌商量問雲門餅趙州茶未審是同是別師云一個鼻頭兩孔出氣問和尚拄杖子佛來也打魔來也打未審是何意旨師云不敢輕慢進云卻成侮慢去也師云辜恩負德漢便打出問菩薩護生南泉為甚卻斬貓兒師云大盡三十日小盡二十九僧云還有罪過也無師打云還我貓兒來僧罔措師又打云死貓兒問三腳驢子弄蹄行且道日行多少師云闍黎到處者畜生亦到問倩女離魂那個是真的師云演祖被你帶纍僧云意旨如何師以偈示之曰自西自東自南自北之子於歸無思不服師同貴州僧喫茶次問云栗棘蓬你作麼生吞僧云百雜碎師云亂統禪和如麻似粟僧無語師起身云黔地之驢便歸方丈問衆生本來是佛學人分上因甚卻不是師云是甚麼僧無語師打云將諸你是個人因事有僧問千佛出世不通懺悔和尚今日因甚許人懺悔師云我者裏無佛進云如何得懺悔去師云無間罪報其事如是問如何是中興境師云山是山水是水如何是境中人師云僧是僧俗是俗如何是人境俱奪師云瞎漢你話頭也忘卻那如何是人境俱不奪師云誰人知此意令我憶南泉行實師示寂前一日合堂僧衆偕休休王居士等集方丈炷香作禮請師自述行實師云我身尚幻何有實行雲駛月暈舟行岸移不過一期將錯就錯阿誰不知奚必重申以笑人耶衆堅請再三乃曰我是本省富順縣劉氏子父母雙亡時年方十五孤苦伶俜為親眷所棄東行西蕩遊戲自適一日入鄰寺見僧衆誦經儀表可觀歸家便不茹葷十八歲行止轉不稱意乃棄家業往江安縣禮觀音院知安師脫白聞破山老人從天童歸住梁山萬峰便買舟東下至堂中禮燕居和尚賜法名圓胤字嗣燈執事巾瓶一日進方丈作禮云求老和尚開示師翁豎拳曰會麼曰不會師翁便掌于是勇猛參究直廢寢食師翁受江安蟠龍請豫作柴頭一日問師翁某甲斫柴如何得了大事師翁曰待你柴開斧脫即向你道豫展手曰柴開斧脫也師翁曰還我斧柄子來豫撫掌而出師翁冷笑一聲胸中轉見迷悶行住坐臥無不追究尋常被人問著古德言句不識廉恥也去下語也去拈頌有般沒下落漢便來點頭點腦說是說非我卻向前叱之曰者是甚麼所在許你者孟八郎來牽腸曳氣如是不敢近前造次衆兄弟行腳不是小事須具些子眼目莫受人埋沒天下有真正大善知識爾等急去參取自己切莫自瞞參禪畢竟能了生死不得錯過我今生死根株實未嚗斷安可亂統祇任默默體察不悟不休解制後隨燕和尚于川之西北行止數年烽煙臨川辟居九支山別燕和尚隨體和尚住鎮雄寨逮乙未春干戈漸寢豫有桑梓之思遂歸富順緝理中興禪院二三年來役于土木丁酉秋將落成而本師開峰老和尚至因諸山求戒本師曰山僧者裏無戒法與人若有戒法與人與者受者當墮無間地獄時一衆無語本師震威一喝我進語曰與麼則竹密不妨流水過山高豈礙白雲飛本師曰然則今日說戒去也我曰不可頭上更安頭本師曰雖然如是更聽一偈清風為衣虛空為戒信受奉行常常不壞黑漆杖頭日月明秋深巖桂傳天籟喝一喝我爾時忽然見梁山老師翁為我處遂出衆連拜不知其數本師亦秖笑而忘言臨行以偈囑豫曰一棒臨時殺活同等間莫與世人逢秋風扶轉三巴棹大海波心釣巨龍豫送別本師遂掩關本山遵等間莫與世人逢之訓將及三載而玄亮王公偕諸山耆宿相迫出關出者場醜直是汗愧無地且如今與汝等出作入息如個三家村裏俗人一般明日死期到來未免手忙腳亂皆是汝等共知共見何必欲我再露布一場家醜作諸方笑具古人云似我者拙學我者死如我今日者等絡索何所取裁蓋是汝等不知自己腳跟下各各有一段奇特因緣非唇舌之所能言所謂千聖不傳之祕要宜自潛心體究以悟為期勿負斯言自貽後悔珍重珍重衆復作禮擬退師噓一聲就枕而臥至翌日早粥後命行者聲鐘集衆于方丈師起端坐略言住持大概以卸院事畢良久豎指云即此住即此去聲未盡冥目而寂
