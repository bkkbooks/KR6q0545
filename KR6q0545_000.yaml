front:
  text: 密行禪師語錄序向上一事不受功勳一棒當頭直指心源拈布衫之七斤道離鉤之三寸橫施逆用一切臨時皆不在語言文字者也故有以見聞覺知之性塞滿虛空黃卷赤軸之言承當教意其不契天下老和尚棒頭者幾幾矣今秋密行禪師從滇南過邵陵予緣晤於耑山坐間示以隨錄吟誦再四知其遠傳臨濟正宗近為破山嫡子予更服禪師根性鄭重手眼圓明至若文字音律不縱不拘且於出詞吐氣間大用全提鉗錘惡辣不捨身命人難以進步與乎俯就行施趨崇高重倒語顛言胡猜亂喝者相去霄壤矣若夫一喜一怒有斬釘拔楔之作用一定一動有殺人活人之妙訣而世之語言文字實無以過之予試問諸且美文字而為禪宗乎美禪宗而在文字乎讀斯錄者請參之己亥中秋前七日邵陵耑山弟子車以遵釋名音遙拜書密行忍禪師目錄次卷之一序上堂卷之二上堂機緣法語職事榜安禪榜卷之三頌古詩偈贊書問佛事行實法派卷之四附嗣燈禪師語錄序上堂機緣行實
